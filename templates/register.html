{% extends 'base.html' %}

{% block title %}Registrarse | Boletix{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h2 class="form-title">Crear una Cuenta</h2>
        <p class="form-subtitle">Únete a Boletix y compra tus entradas para los mejores eventos.</p>
    </div>
    
    <form action="{{ url_for('register') }}" method="POST" id="register-form" novalidate>
        <div class="form-group">
            <label for="name" class="form-label">Nombre Completo</label>
            <input type="text" name="name" id="name" class="form-control" placeholder="Ej. Juan Pérez" value="{{ request.form.get('name', '') }}">
            <div class="form-error-text" id="name-error"></div>
        </div>
        
        <div class="form-group">
            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email" name="email" id="email" class="form-control" placeholder="juan.perez@example.com" value="{{ request.form.get('email', '') }}">
            <div class="form-error-text" id="email-error"></div>
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" name="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres">
            <div class="form-error-text" id="password-error"></div>
        </div>
        
        <button type="submit" class="form-btn-submit" id="btn-submit-register">
            <i class="fa-solid fa-user-plus"></i> Registrarse
        </button>
    </form>
    
    <div class="form-footer-link">
        ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a>
    </div>
</div>
{% endblock %}
